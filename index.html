<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        .carousel {
            position: relative;
            width: 100%;
            overflow: hidden;
        }
        .slides {
            display: flex;
            transition: transform 0.5s ease;
        }
        .slide {
            min-width: 100%;
            box-sizing: border-box;
        }
        .dots {
            text-align: center;
            padding: 10px 0;
        }
        .dot {
            display: inline-block;
            cursor: pointer;
            height: 12px;
            width: 12px;
            margin: 0 5px;
            border-radius: 50%;
            background-color: #bbb;
        }
        .active {
            background-color: #717171;
        }
    </style>
</head>
<body>
    <div class="carousel">
        <div class="slides">
            <div class="slide"><img src="1.png" alt="Image 1"></div>
            <div class="slide"><img src="2.png" alt="Image 2"></div>
            <div class="slide"><img src="3.png" alt="Image 3"></div>
        </div>
        <div class="dots"></div>
    </div>

    <script>
        let slideIndex = 0;
        const slides = document.querySelectorAll('.slide');
        const dotsContainer = document.querySelector('.dots');

        function showSlides() {
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = 'none';  
            }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1} 
            for (let i = 0; i < dotsContainer.children.length; i++) {
                dotsContainer.children[i].className = dotsContainer.children[i].className.replace(' active', '');
            }
            slides[slideIndex - 1].style.display = 'block';  
            dotsContainer.children[slideIndex - 1].className += ' active';
            setTimeout(showSlides, 4000); // Change image every 4 seconds
        }

        function createDots() {
            for (let i = 0; i < slides.length; i++) {
                const dot = document.createElement('span');
                dot.className = 'dot';
                dot.addEventListener('click', () => {
                    slideIndex = i;
                    showSlides();
                });
                dotsContainer.appendChild(dot);
            }
        }

        createDots();
        showSlides();
    </script>
</body>
</html>
